[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "finance-pipeline"
version = "0.1.0"
description = "MVP crypto market data pipeline with Kafka, Flink SQL, and simple strategy services."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi>=0.115.12,<1.0.0",
  "kafka-python>=2.2.15,<3.0.0",
  "uvicorn>=0.34.0,<1.0.0",
  "websockets>=15.0.1,<16.0.0",
]

[dependency-groups]
dev = [
  "pytest>=8.3.5,<9.0.0",
]

[project.scripts]
replay-market = "finance_pipeline.replay:main"
strategy-service = "finance_pipeline.strategy_service:main"
portfolio-service = "finance_pipeline.portfolio_service:main"
dashboard-service = "finance_pipeline.dashboard_service:main"
stream-binance = "finance_pipeline.binance_source:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["finance_pipeline*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
