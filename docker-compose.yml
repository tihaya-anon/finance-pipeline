services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --check=false
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:${HOST_KAFKA_PORT:-39092}
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:${HOST_KAFKA_PORT:-39092}
    ports:
      - "${HOST_KAFKA_PORT:-39092}:${HOST_KAFKA_PORT:-39092}"
      - "${HOST_REDPANDA_ADMIN_PORT:-9644}:9644"

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:v2.8.2
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "${HOST_CONSOLE_PORT:-8080}:8080"
    depends_on:
      - redpanda

  questdb:
    image: questdb/questdb:8.3.3
    ports:
      - "${HOST_QUESTDB_HTTP_PORT:-9000}:9000"
      - "${HOST_QUESTDB_ILP_PORT:-9009}:9009"
      - "${HOST_QUESTDB_PG_PORT:-8812}:8812"

  grafana:
    image: grafana/grafana-oss:11.5.2
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/finance-pipeline.json
    ports:
      - "${HOST_GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - questdb

  jobmanager:
    image: finance-pipeline-flink:local
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    command: jobmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
    ports:
      - "${HOST_FLINK_PORT:-8081}:8081"
    depends_on:
      - redpanda

  taskmanager:
    image: finance-pipeline-flink:local
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    command: taskmanager
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
    depends_on:
      - jobmanager

  sql-client:
    image: finance-pipeline-flink:local
    build:
      context: .
      dockerfile: docker/flink/Dockerfile
    entrypoint:
      - /bin/bash
      - -lc
      - /opt/flink/bin/sql-client.sh -f /opt/flink/sql/market_features.sql
    depends_on:
      - redpanda
      - jobmanager
      - taskmanager
